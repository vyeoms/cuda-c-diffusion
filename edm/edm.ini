# EDM training config

[model]
channels   = 32,64,128
emb_dim    = 64
heads      = 4
t          = 0.3

[training]
batch_size     = 64
train_steps    = 20000
lr             = 1e-3
lr_warmup      = 500
lr_ref         = 5000
ema_decay      = 0.99

[edm]
sigma_data = 0.5
p_mean     = -1.2
p_std      = 1.2
sigma_min  = 0.002
sigma_max  = 80.0

[sampling]
sample_steps = 50
vis_batch    = 16
demo_sigma   = 0.5

[data]
images = data/mnist_train_images.bin
H      = 28
W      = 28
C      = 1
