# DDPM training config (x0-prediction)

[model]
channels   = 32,64,128
emb_dim    = 64
heads      = 4
num_groups = 32

[training]
batch_size   = 8
train_steps  = 10000
lr           = 1e-3
lr_warmup    = 500
lr_ref       = 2000
snr_gamma    = 5.0
ema_decay    = 0.999

[schedule]
T          = 1000
beta_start = 1e-4
beta_end   = 0.02

[sampling]
ddim_steps = 50

[data]
images = data/mnist_train_images.bin
H      = 28
W      = 28
C      = 1
